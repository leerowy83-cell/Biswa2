services:
  - type: web
    name: biswa-class-manager
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn IN16_Study_Manager.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@in16.ac.ke
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: biswa-class-db
          property: connectionString

databases:
  - name: biswa-class-db
    databaseName: biswa_class_manager
    user: biswa
